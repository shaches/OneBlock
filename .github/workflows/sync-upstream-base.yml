name: Sync upstream-raw mirror

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/MrMarL/OneBlock.git

      - name: Fetch remotes
        run: |
          git fetch origin
          git fetch upstream

      - name: Reset upstream-raw to upstream/main
        run: |
          git checkout -B upstream-raw upstream/main

      - name: Force-push upstream-raw
        run: git push origin upstream-raw --force-with-lease
