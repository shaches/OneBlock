name: Sync merge-upstream branch

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/MrMarL/OneBlock.git

      - name: Fetch remotes
        run: |
          git fetch origin
          git fetch upstream

      - name: Reset merge-upstream to upstream/main
        run: |
          git checkout -B merge-upstream upstream/main

      - name: Merge origin/main
        run: |
          if ! git merge origin/main --no-edit; then
            echo "Merge failed due to conflicts. Aborting."
            git merge --abort
            exit 1
          fi

      - name: Force-push merge-upstream
        run: git push origin merge-upstream --force-with-lease
